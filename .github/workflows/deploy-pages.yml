name: Deploy Pages (bell-web + docs)

on:
  push:
    branches: [main]
    paths:
      - "apps/bell-web/**"
      - "apps/docs/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build bell-web
        env:
          VITE_CALL_API_URL: ${{ secrets.VITE_CALL_API_URL }}
          VITE_CAFE_LATITUDE: ${{ secrets.VITE_CAFE_LATITUDE }}
          VITE_CAFE_LONGITUDE: ${{ secrets.VITE_CAFE_LONGITUDE }}
          VITE_CAFE_RADIUS_METERS: ${{ secrets.VITE_CAFE_RADIUS_METERS }}
        run: pnpm --filter @game-master-bell/bell-web build
      - name: Build docs
        run: pnpm --filter @game-master-bell/docs build
      - name: Assemble Pages artifact
        run: |
          mkdir -p pages-dist
          cp -r apps/bell-web/dist/. pages-dist/
          mkdir -p pages-dist/docs
          cp -r apps/docs/.vitepress/dist/. pages-dist/docs/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
