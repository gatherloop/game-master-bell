name: Deploy api to VPS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint apps/api
      - run: pnpm --filter @game-master-bell/api typecheck
      - run: pnpm --filter @game-master-bell/api test
      - run: pnpm --filter @game-master-bell/api build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export CI=true
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install
            corepack enable
            git fetch origin main
            git reset --hard origin/main
            cat > apps/api/fcm-service-account.json <<'FCM_EOF'
            ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
            FCM_EOF
            cat > apps/api/.env <<'ENV_EOF'
            FCM_SERVICE_ACCOUNT_PATH=./fcm-service-account.json
            ENV_EOF
            pnpm install --frozen-lockfile
            pnpm --filter @game-master-bell/api build
            pnpm prune --prod -r
            mkdir -p ~/.config/systemd/user
            cp apps/api/deploy/game-master-bell-api.service ~/.config/systemd/user/
            systemctl --user daemon-reload
            systemctl --user enable game-master-bell-api
            systemctl --user restart game-master-bell-api
