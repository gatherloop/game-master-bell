name: Deploy api to VPS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint apps/api
      - run: pnpm --filter @game-master-bell/api typecheck
      - run: pnpm --filter @game-master-bell/api test
      - run: pnpm --filter @game-master-bell/api build

      # Package a self-contained, prod-only copy of apps/api (dist/ +
      # resolved node_modules, no workspace symlinks) so the VPS never has
      # to run `pnpm install`/`tsc` itself — see apps/api/docs/DEPLOY_NATIVE.md.
      # --legacy is required because this workspace doesn't set
      # inject-workspace-packages=true.
      - run: pnpm --filter @game-master-bell/api deploy --prod --legacy api-deploy
      - run: tar -czf api-deploy.tar.gz -C api-deploy .

      - uses: actions/upload-artifact@v4
        with:
          name: api-deploy
          path: api-deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-deploy

      - name: Copy build artifact to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "api-deploy.tar.gz"
          target: "/tmp"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            rm -rf apps/api/dist apps/api/node_modules
            mkdir -p apps/api
            tar -xzf /tmp/api-deploy.tar.gz -C apps/api
            rm -f /tmp/api-deploy.tar.gz
            cat > apps/api/fcm-service-account.json <<'FCM_EOF'
            ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
            FCM_EOF
            cat > apps/api/.env <<'ENV_EOF'
            FCM_SERVICE_ACCOUNT_PATH=./fcm-service-account.json
            ENV_EOF
            mkdir -p ~/.config/systemd/user
            cp apps/api/deploy/game-master-bell-api.service ~/.config/systemd/user/
            systemctl --user daemon-reload
            systemctl --user enable game-master-bell-api
            systemctl --user restart game-master-bell-api
