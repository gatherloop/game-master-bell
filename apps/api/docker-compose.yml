services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      FCM_SERVICE_ACCOUNT_PATH: /app/apps/api/fcm-service-account.json
    volumes:
      - ./fcm-service-account.json:/app/apps/api/fcm-service-account.json:ro
